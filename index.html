<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="A Survey App crated by CGS 402 Group F students to collect data on how well matiks suits its users"
    />
    <script>
      (function () {
        const storageKey = "cgs-402-survey-theme";
        let storedTheme = null;

        try {
          storedTheme = localStorage.getItem(storageKey);
        } catch (_) {}

        const theme = storedTheme === "light" ? "light" : "dark";
        const root = document.documentElement;
        root.classList.toggle("light", theme === "light");
        root.style.colorScheme = theme;
      })();
    </script>
    <title>Understanding Matiks</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
