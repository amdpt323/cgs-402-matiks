<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="A React + Vite survey website with a dark night theme, theme toggle, and horizontal rating cards built with shadcn-style UI."
    />
    <script>
      (function () {
        const storageKey = "night-survey-theme";
        const storedTheme = localStorage.getItem(storageKey);
        const theme = storedTheme === "light" ? "light" : "dark";
        const root = document.documentElement;
        root.classList.toggle("dark", theme === "dark");
        root.style.colorScheme = theme;
      })();
    </script>
    <title>Night Survey</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
